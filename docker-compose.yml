version: '3.8'

services:
  bambu-farm-monitor:
    image: mythikwolf/bambu-farm-monitor:latest
    container_name: bambu-farm-monitor
    ports:
      - "8081:8080"   # Web UI
      - "1984:1984"   # go2rtc API
      - "5000:5000"   # Config API
      - "5001:5001"   # Status API
    volumes:
      - ./config:/app/config
    restart: unless-stopped
